<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi OTP · PJAR SYSTEM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #101115;
            --surface: #1b1d24;
            --surface-alt: #23252e;
            --text: #edeef2;
            --text-muted: #8b8e9b;
            --accent-red: #ff4b3e;
            --accent-teal: #2dd4bf;
            --border: #2e313c;
        }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 50% 15%, rgba(45,212,191,0.06), transparent 45%), var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin: 0;
        }
        .display { font-family: 'Archivo Black', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .deck {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 36px 32px 32px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
        }
        .deck-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .rec-dot {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .rec-dot span.dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-teal);
            box-shadow: 0 0 0 3px rgba(45,212,191,0.15);
        }
        .deck-title { font-size: 26px; margin: 0 0 6px; text-align: center; }
        .deck-sub { color: var(--text-muted); font-size: 13.5px; margin: 0 0 28px; text-align: center; line-height: 1.5; }
        
        .field { margin-bottom: 20px; }
        .field label {
            display: block; font-size: 11px; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--text-muted); margin-bottom: 9px;
            text-align: center;
        }
        .field input {
            width: 100%; background: var(--surface-alt); border: 1px solid var(--border);
            border-radius: 8px; padding: 14px; color: var(--text); font-size: 24px;
            outline: none; transition: all .15s ease; text-align: center;
            letter-spacing: 8px; font-weight: 700;
        }
        .field input:focus { border-color: var(--accent-teal); background: #26282f; }
        .field input::placeholder { color: #434651; font-size: 14px; letter-spacing: normal; font-weight: 400; }
        
        .login-error {
            background: rgba(255,75,62,0.06); border: 1px solid var(--accent-red);
            color: var(--accent-red); padding: 10px 12px; border-radius: 6px;
            font-size: 12.5px; margin-bottom: 20px; text-align: center;
        }
        
        .play-btn {
            width: 100%; border: none; border-radius: 8px; padding: 13px 16px;
            background: var(--accent-teal); color: #0a0f0f; font-weight: 700;
            font-size: 14.5px; display: flex; align-items: center; justify-content: center;
            gap: 9px; cursor: pointer; transition: all .12s ease;
        }
        .play-btn:hover { filter: brightness(1.08); }
        .play-btn:active { transform: scale(0.98); }
        
        .deck-foot {
            margin-top: 24px; padding-top: 18px; border-top: 1px dashed var(--border);
            font-size: 12px; color: var(--text-muted); text-align: center;
        }
        .deck-foot a { color: var(--text); text-decoration: none; font-weight: 600; }
        .deck-foot a:hover { color: var(--accent-teal); }
    </style>
</head>
<body>
    <div class="deck">
        <div class="deck-top">
            <div class="rec-dot"><span class="dot"></span> AUTH_CHALLENGE</div>
            <div class="mono" style="font-size:11px; color:var(--text-muted);">MFA_REQUIRED</div>
        </div>
        
        <h1 class="deck-title display">VERIFIKASI OTP</h1>
        <p class="deck-sub">Masukkan kode enkripsi 6-digit yang telah dikirimkan ke alamat email Anda.</p>

        {% if error %}
        <div class="login-error mono">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="field">
                <label class="mono">SECURE_TOKEN_INPUT</label>
                <input 
                    type="text" 
                    name="otp" 
                    maxlength="6" 
                    required 
                    placeholder="000000" 
                    autocomplete="one-time-code"
                    class="mono"
                >
            </div>
            <button type="submit" class="play-btn display">
                VERIFIKASI TOKEN
            </button>
        </form>

        <div class="deck-foot">
            <a href="/" class="mono">← BACK_TO_GATEWAY</a>
        </div>
    </div>
</body>
</html>
