<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Berhasil · PJAR SYSTEM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #101115;
            --surface: #1b1d24;
            --text: #edeef2;
            --text-muted: #8b8e9b;
            --accent-teal: #2dd4bf;
            --border: #2e313c;
        }
        * { box-sizing: border-box; }
        body { 
            background: radial-gradient(circle at 50% 15%, rgba(45,212,191,0.06), transparent 45%), var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 24px; 
            margin: 0; 
        }
        .display { font-family: 'Archivo Black', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .deck { 
            width: 100%; 
            max-width: 400px; 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            padding: 40px 32px; 
            text-align: center; 
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6); 
        }
        .icon { 
            font-size: 44px; 
            margin-bottom: 20px; 
            color: var(--accent-teal); 
            text-shadow: 0 0 20px rgba(45,212,191,0.3);
        }
        h2 { margin: 0 0 12px; font-size: 24px; color: var(--accent-teal); }
        p { color: var(--text-muted); font-size: 13.5px; line-height: 1.6; margin: 0 0 28px; }
        
        .login-btn { 
            width: 100%;
            border: none; 
            border-radius: 8px; 
            padding: 13px 16px; 
            background: var(--accent-teal); 
            color: #0a0f0f; 
            font-weight: 700; 
            font-size: 14.5px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 9px; 
            cursor: pointer; 
            text-decoration: none;
            transition: all .12s ease; 
        }
        .login-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .login-btn:active { transform: scale(0.99); }
    </style>
</head>
<body>
    <div class="deck">
        <div class="icon mono">✓</div>
        <h2 class="display">ACCESS GRANTED</h2>
        <p>
            Selamat! Node akun Anda telah berhasil diverifikasi dalam kluster.
            <br><br>
            Silakan akses repositori utama menggunakan kredensial Anda. Sistem akan memicu pengiriman token OTP ke email sebagai protokol keamanan berlapis (2FA).
        </p>
        <a href="/" class="login-btn display">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            LOGIN SEKARANG
        </a>
    </div>
</body>
</html>
