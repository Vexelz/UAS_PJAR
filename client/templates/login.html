<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk · PJAR SYSTEM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #101115;
            --surface: #1b1d24;
            --surface-alt: #23252e;
            --text: #edeef2;
            --text-muted: #8b8e9b;
            --accent-red: #ff4b3e;
            --accent-teal: #2dd4bf;
            --border: #2e313c;
        }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 15%, rgba(255,75,62,0.07), transparent 40%), var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            margin: 0;
        }
        .display { font-family: 'Archivo Black', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .deck {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 36px 32px 32px;
            position: relative;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
        }
        .deck-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }
        .rec-dot {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .rec-dot span.dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-red);
            box-shadow: 0 0 0 3px rgba(255,75,62,0.15);
            animation: pulse 1.6s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 3px rgba(255,75,62,0.15); }
            50% { opacity: 0.55; box-shadow: 0 0 0 6px rgba(255,75,62,0.05); }
        }
        .deck-title { font-size: 28px; margin: 0 0 4px; }
        .deck-title .sep { color: var(--text-muted); font-weight: 400; margin: 0 6px; }
        .deck-sub { color: var(--text-muted); font-size: 13.5px; margin: 0 0 28px; }
        
        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: 11px; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px;
        }
        .field input {
            width: 100%; background: var(--surface-alt); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px 14px; color: var(--text); font-size: 14.5px;
            outline: none; transition: all .15s ease;
        }
        .field input:focus { border-color: var(--accent-teal); background: #26282f; }
        
        .login-error { font-size: 12.5px; color: var(--accent-red); margin-bottom: 14px; }
        
        .play-btn {
            width: 100%; border: none; border-radius: 8px; padding: 13px 16px;
            background: var(--accent-teal); color: #0a0f0f; font-weight: 700;
            font-size: 14.5px; display: flex; align-items: center; justify-content: center;
            gap: 9px; cursor: pointer; transition: all .12s ease;
        }
        .play-btn:hover { filter: brightness(1.08); }
        .play-btn:active { transform: scale(0.98); }
        
        .deck-foot {
            margin-top: 22px; padding-top: 18px; border-top: 1px dashed var(--border);
            font-size: 12px; color: var(--text-muted); text-align: center;
        }
        .deck-foot a { color: var(--accent-teal); text-decoration: none; font-weight: 600; }
        .deck-foot a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="deck">
        <div class="deck-top">
            <div class="rec-dot"><span class="dot"></span> SECURE GATEWAY</div>
            <div class="mono" style="font-size:11px; color:var(--text-muted);">SYS_INIT</div>
        </div>
        <h1 class="deck-title display">UTP<span class="sep">/</span>UDP</h1>
        <p class="deck-sub">Masuk ke repositori jaringan terdistribusi untuk mengelola media.</p>

        {% if error %}
        <div class="login-error mono">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="field">
                <label>Email Sistem</label>
                <input type="email" name="email" placeholder="name@domain.com" required>
            </div>
            <div class="field">
                <label>Kata Sandi</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="play-btn display">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                MASUK TERMINAL
            </button>
        </form>

        <div class="deck-foot">
            Belum terdaftar? <a href="/register">Buat Akun Baru</a>
        </div>
    </div>
</body>
</html>
